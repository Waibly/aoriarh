services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aoriarh}
      POSTGRES_USER: ${POSTGRES_USER:-aoriarh}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aoriarh}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - aoriarh

  qdrant:
    image: qdrant/qdrant:v1.13.2
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -c 'cat < /dev/null > /dev/tcp/localhost/6333'"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - aoriarh

  minio:
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - aoriarh

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - aoriarh

  backend: &backend-common
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment: &backend-env
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-aoriarh}
      POSTGRES_USER: ${POSTGRES_USER:-aoriarh}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-aoriarh-documents}
      MINIO_USE_SSL: "false"
      SECRET_KEY: ${SECRET_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      VOYAGE_API_KEY: ${VOYAGE_API_KEY:-}
      REDIS_URL: redis://redis:6379
      LOG_FORMAT: text
      SEED_ADMIN: "true"
      ADMIN_EMAIL: hello@aoriarh.fr
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-REMPLACER-PAR-MOT-DE-PASSE-FORT-MIN-16-CHARS}
      LLM_MODEL: gpt-5-mini
      BACKEND_CORS_ORIGINS: '["http://localhost:3000"]'
      FRONTEND_URL: http://localhost:3000
      BREVO_API_KEY: ${BREVO_API_KEY:-}
      WORKERS: ${WORKERS:-4}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aoriarh

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["python", "-m", "arq", "app.worker.WorkerSettings"]
    environment:
      <<: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aoriarh

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      INTERNAL_API_URL: http://backend:8000/api/v1
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-dev-nextauth-secret}
      AUTH_TRUST_HOST: "true"
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - aoriarh

volumes:
  postgres_data:
  qdrant_data:
  minio_data:
  redis_data:

networks:
  aoriarh:
    driver: bridge
