server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Garder uniquement les conteneurs avec le label logging=promtail
      - source_labels: ["__meta_docker_container_label_logging"]
        regex: "promtail"
        action: keep
      # Nom du service comme label
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: "container"
      # Label service depuis docker-compose
      - source_labels: ["__meta_docker_container_label_com_docker_compose_service"]
        target_label: "service"
    pipeline_stages:
      # Parser les logs JSON structurés
      - json:
          expressions:
            level: level
            event: event
            timestamp: timestamp
      - labels:
          level:
          event:
